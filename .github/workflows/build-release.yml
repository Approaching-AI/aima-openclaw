name: Build Release

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release bundle
        run: bash scripts/build-release.sh
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: aima-openclaw-dist
          path: dist/
